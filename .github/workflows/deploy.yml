name: Deploy to GitHub Pages
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
    matrix:
    node-version: [16.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2.5.2
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@4.5.4
        with:
          branch: gh-pages
          folder: build
          token: ${{ secrets.PAT }}

